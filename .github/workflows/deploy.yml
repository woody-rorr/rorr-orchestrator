name: Deploy orchestrator to ECS

on:
  push:
    branches: [main]
    paths:
      - '*.js'
      - 'public/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: rorr-orchestrator
  ECR_REGISTRY: 239460481239.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER: mcp-agents-staging-cluster
  SERVICE: rorr-mcp-orchestrator-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239460481239:role/github-actions-rorr-mcp
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

      - name: Wait for stable (max 40min)
        run: |
          for i in $(seq 1 160); do
            STATE=$(aws ecs describe-services \
              --cluster $CLUSTER --services $SERVICE \
              --region $AWS_REGION \
              --query 'services[0].deployments[0].rolloutState' --output text)
            COUNT=$(aws ecs describe-services \
              --cluster $CLUSTER --services $SERVICE \
              --region $AWS_REGION \
              --query 'length(services[0].deployments)' --output text)
            echo "[$i/160] rollout=$STATE deployments=$COUNT"
            if [ "$STATE" = "COMPLETED" ] && [ "$COUNT" = "1" ]; then
              echo "✅ stable"; exit 0
            fi
            if [ "$STATE" = "FAILED" ]; then
              echo "✖ rollout FAILED"; exit 1
            fi
            sleep 15
          done
          echo "✖ 40분 내 stable 도달 못 함"; exit 1

      - name: Done
        run: echo "✅ Deployed orchestrator"
