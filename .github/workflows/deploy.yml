name: Deploy orchestrator to ECS

on:
  push:
    branches: [main]
    paths:
      - 'index.js'
      - 'chat.js'
      - 'mcpRegistry.js'
      - 'public/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: rorr-orchestrator
  ECR_REGISTRY: 239460481239.dkr.ecr.us-east-1.amazonaws.com
  CLUSTER: mcp-agents-staging-cluster
  SERVICE: rorr-orchestrator-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::239460481239:role/github-actions-rorr-mcp
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ github.sha }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster $CLUSTER \
            --service $SERVICE \
            --force-new-deployment \
            --region $AWS_REGION > /dev/null

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster $CLUSTER \
            --services $SERVICE \
            --region $AWS_REGION

      - name: Done
        run: echo "✅ Deployed orchestrator"
